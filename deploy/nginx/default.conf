limit_req_zone $binary_remote_addr zone=contact_rl:10m rate=5r/m;

upstream backend_upstream {
    server api:8080;
    keepalive 32;
}

server {
    listen 8080;
    server_name _;

    add_header X-Content-Type-Options     "nosniff" always;
    add_header X-Frame-Options            "DENY" always;
    add_header X-XSS-Protection           "1; mode=block" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;

    client_max_body_size  2m;
    client_body_timeout   12s;
    client_header_timeout 12s;
    send_timeout          12s;

    location = /kmt/admin {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    location ^~ /kmt/admin/ {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    location = /kmt/contact {
        limit_req zone=contact_rl burst=3 nodelay;
        limit_req_status 429;
        proxy_pass        http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout    15s;
        proxy_send_timeout    15s;
    }

    location /kmt/ {
        proxy_pass        http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout    15s;
    }

    location /api/kmt/admin/ {
        proxy_pass        http://backend_upstream/kmt/admin/;
        proxy_http_version 1.1;
        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
    }

    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|svg|ico)$ {
        root       /usr/share/nginx/html;
        access_log off;
        expires    30d;
        add_header Cache-Control              "public, max-age=2592000, immutable" always;
        add_header X-Content-Type-Options     "nosniff" always;
        add_header X-Frame-Options            "DENY" always;
        add_header X-XSS-Protection           "1; mode=block" always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;
        try_files  $uri =404;
    }

    location / {
        root      /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
